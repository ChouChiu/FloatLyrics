name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag (for example, v1.1.0)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  packages:
    name: Build Linux packages
    runs-on: ubuntu-latest
    timeout-minutes: 45
    container:
      image: archlinux:latest

    steps:
      - name: Install build dependencies
        run: >-
          pacman -Syu --noconfirm --needed
          base-devel
          git
          gtk4
          gtk4-layer-shell
          webkitgtk-6.0
          openssl
          rust
          dpkg
          unzip

      - name: Check out release tag
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG }}

      - name: Trust checked-out workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Validate release tag
        shell: bash
        run: |
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
          package_version=$(cargo pkgid --locked | sed 's/.*@//')
          test "$RELEASE_TAG" = "v$package_version"
          test "$(git describe --tags --exact-match)" = "$RELEASE_TAG"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Restore Bun cache
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore Cargo cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ runner.arch }}-arch-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}-${{ env.RELEASE_TAG }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ runner.arch }}-arch-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}-
            cargo-${{ runner.os }}-${{ runner.arch }}-arch-

      - name: Install packaging tools
        run: |
          cargo install --locked --version 3.7.0 cargo-deb
          cargo install --locked --version 0.21.0 cargo-generate-rpm

      - name: Build release binary
        run: cargo build --locked --release

      - name: Build distribution packages
        run: |
          mkdir dist
          cargo deb --locked --no-build --output dist
          cargo generate-rpm --output dist

      - name: Upload release assets
        uses: actions/upload-artifact@v7
        with:
          name: floatlyrics-${{ env.RELEASE_TAG }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub release
    needs: packages
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          name: floatlyrics-${{ env.RELEASE_TAG }}
          path: dist

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t assets < <(find dist -maxdepth 1 -type f \
            \( -name '*.deb' -o -name '*.rpm' \) -print | sort)
          test "${#assets[@]}" -eq 2

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "FloatLyrics ${RELEASE_TAG#v}" \
              --generate-notes \
              --verify-tag
          fi

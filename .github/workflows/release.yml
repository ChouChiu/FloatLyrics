name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag (for example, v1.0.0)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build-packages:
    name: Build .deb and .rpm packages
    runs-on: ubuntu-latest
    timeout-minutes: 45
    container:
      image: archlinux:latest

    steps:
      - name: Install system dependencies
        run: >-
          pacman -Syu --noconfirm --needed
          base-devel
          git
          gtk4
          gtk4-layer-shell
          openssl
          rust
          dpkg

      - name: Check out release tag
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate version tag
        run: |
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
          version=$(cargo pkgid --locked | sed 's/.*@//')
          test "$RELEASE_TAG" = "v$version"
          test "$(git describe --tags --exact-match)" = "$RELEASE_TAG"

      - name: Cache Cargo registry and target
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-deb-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-deb-cargo-
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked --all-targets --all-features

      - name: Build release binary
        run: cargo build --locked --release

      - name: Install cargo-deb and cargo-generate-rpm
        run: |
          cargo install cargo-deb --locked
          cargo install cargo-generate-rpm --locked

      - name: Build .deb package
        run: cargo deb

      - name: Build .rpm package
        run: cargo generate-rpm

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: floatlyrics-${{ env.RELEASE_TAG }}-deb
          path: target/debian/*.deb
          if-no-files-found: error
          retention-days: 14

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v7
        with:
          name: floatlyrics-${{ env.RELEASE_TAG }}-rpm
          path: target/generate-rpm/*.rpm
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release
    needs: build-packages
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download .deb artifact
        uses: actions/download-artifact@v8
        with:
          name: floatlyrics-${{ env.RELEASE_TAG }}-deb
          path: dist

      - name: Download .rpm artifact
        uses: actions/download-artifact@v8
        with:
          name: floatlyrics-${{ env.RELEASE_TAG }}-rpm
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          deb_file=$(ls dist/*.deb | head -1)
          rpm_file=$(ls dist/*.rpm | head -1)
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$deb_file" "$rpm_file" \
              --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$RELEASE_TAG" "$deb_file" "$rpm_file" \
              --repo "$GITHUB_REPOSITORY" \
              --title "FloatLyrics ${RELEASE_TAG#v}" \
              --generate-notes \
              --verify-tag
          fi


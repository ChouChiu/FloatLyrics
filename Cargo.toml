[workspace]
members = [".", "crates/core", "crates/support"]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT"

[package]
name = "floatlyrics"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Floating desktop lyrics for Spotify on Linux Wayland."

[dependencies]
anyhow.workspace = true
clap.workspace = true
floatlyrics-core.workspace = true
floatlyrics-support.workspace = true
gtk.workspace = true
gtk4-layer-shell.workspace = true
pangocairo.workspace = true
tokio.workspace = true
tracing.workspace = true

[workspace.dependencies]
anyhow = "1"
clap = { version = "4.5", features = ["derive", "env"] }
directories = "6"
floatlyrics-core = { path = "crates/core" }
floatlyrics-support = { path = "crates/support" }
futures-util = "0.3"
gtk = { package = "gtk4", version = "0.11", features = ["v4_12"] }
gtk4-layer-shell = "0.8"
lyrics-helper = "0.1.5"
pangocairo = "0.22"
rusqlite = { version = "0.37", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
tempfile = "3"
thiserror = "2"
tokio = { version = "1.46", features = ["macros", "rt-multi-thread", "sync", "time"] }
toml = "0.9"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
zbus = { version = "5.7", default-features = false, features = ["tokio"] }
zvariant = "5.9"
